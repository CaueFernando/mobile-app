name: steptostop_app
description: "Um app para ajudar a parar de fumar/vape com um pet virtual."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Flame (Animação e Jogos 2D)
  flame: ^1.10.0

  # Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.0

  # UI
  google_fonts: ^6.1.0

  # Other
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/dog_sprites/idle/
    - assets/dog_sprites/happy/
    - assets/dog_sprites/sad/
    - assets/dog_sprites/eating/
    - assets/images/
    - assets/sounds/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
